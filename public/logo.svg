<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7bc84a"/>
      <stop offset="100%" style="stop-color:#c8e87a"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="200" height="200" fill="url(#bg)" rx="28"/>

  <!-- Court outline -->
  <rect x="34" y="58" width="132" height="84" fill="none" stroke="white" stroke-width="4" stroke-linejoin="round"/>

  <!-- Half-court line -->
  <line x1="100" y1="58" x2="100" y2="142" stroke="white" stroke-width="4"/>

  <!-- Center circle -->
  <circle cx="100" cy="100" r="18" fill="none" stroke="white" stroke-width="4"/>

  <!-- Basketball lines in center circle -->
  <line x1="100" y1="82" x2="100" y2="118" stroke="white" stroke-width="2.5"/>
  <line x1="82" y1="100" x2="118" y2="100" stroke="white" stroke-width="2.5"/>
  <path d="M86 87 Q100 96 86 113" fill="none" stroke="white" stroke-width="2.2"/>
  <path d="M114 87 Q100 96 114 113" fill="none" stroke="white" stroke-width="2.2"/>

  <!-- Left paint -->
  <rect x="34" y="80" width="28" height="40" fill="none" stroke="white" stroke-width="3.5"/>

  <!-- Left free-throw arc (dashed) -->
  <path d="M62 80 A14 20 0 0 1 62 120" fill="none" stroke="white" stroke-width="3" stroke-dasharray="4 3.5"/>

  <!-- Left three-point arc -->
  <path d="M34 66 L52 66 A54 54 0 0 1 52 134 L34 134" fill="none" stroke="white" stroke-width="3.5"/>

  <!-- Right paint -->
  <rect x="138" y="80" width="28" height="40" fill="none" stroke="white" stroke-width="3.5"/>

  <!-- Right free-throw arc (dashed) -->
  <path d="M138 80 A14 20 0 0 0 138 120" fill="none" stroke="white" stroke-width="3" stroke-dasharray="4 3.5"/>

  <!-- Right three-point arc -->
  <path d="M166 66 L148 66 A54 54 0 0 0 148 134 L166 134" fill="none" stroke="white" stroke-width="3.5"/>
</svg>
