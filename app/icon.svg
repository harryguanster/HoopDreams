<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8fce5a"/>
      <stop offset="100%" style="stop-color:#c8e87a"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="100" height="100" fill="url(#bg)" rx="16"/>

  <!-- Court outline -->
  <rect x="18" y="30" width="64" height="40" fill="none" stroke="white" stroke-width="2.2" rx="0.5"/>

  <!-- Half-court line -->
  <line x1="50" y1="30" x2="50" y2="70" stroke="white" stroke-width="2.2"/>

  <!-- Center circle -->
  <circle cx="50" cy="50" r="9" fill="none" stroke="white" stroke-width="2.2"/>

  <!-- Basketball lines on center circle -->
  <line x1="50" y1="41" x2="50" y2="59" stroke="white" stroke-width="1.5"/>
  <line x1="41" y1="50" x2="59" y2="50" stroke="white" stroke-width="1.5"/>
  <path d="M43 43.5 Q50 48 43 56.5" fill="none" stroke="white" stroke-width="1.3"/>
  <path d="M57 43.5 Q50 48 57 56.5" fill="none" stroke="white" stroke-width="1.3"/>

  <!-- Left paint -->
  <rect x="18" y="41" width="14" height="18" fill="none" stroke="white" stroke-width="2"/>

  <!-- Left restricted arc -->
  <path d="M18 41 Q26 50 18 59" fill="none" stroke="white" stroke-width="2" stroke-dasharray="2 2"/>

  <!-- Left three-point arc -->
  <path d="M18 34 Q42 50 18 66" fill="none" stroke="white" stroke-width="2"/>

  <!-- Right paint -->
  <rect x="68" y="41" width="14" height="18" fill="none" stroke="white" stroke-width="2"/>

  <!-- Right restricted arc -->
  <path d="M82 41 Q74 50 82 59" fill="none" stroke="white" stroke-width="2" stroke-dasharray="2 2"/>

  <!-- Right three-point arc -->
  <path d="M82 34 Q58 50 82 66" fill="none" stroke="white" stroke-width="2"/>
</svg>
